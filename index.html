<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Foundation Food Ordering</title>
    <style>
        :root { --blue: #0288d1; --green: #8bc34a; --text: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #ffffff; color: var(--text); }
        
        /* കാഴ്ചക്കാർക്ക് എളുപ്പത്തിൽ കാണാൻ വലിയ അക്ഷരങ്ങൾ */
        .header { background: white; text-align: center; padding: 20px; border-bottom: 6px solid var(--green); }
        .logo { width: 100px; margin-bottom: 10px; }
        .header h1 { margin: 0; color: var(--blue); font-size: 28px; }

        .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #eee; border-bottom: 1px solid #ccc; }
        .btn-lang { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-admin { background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        .container { max-width: 900px; margin: 20px auto; padding: 15px; }
        
        /* മെനു ഗ്രിഡ് */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .food-card { background: #f1f8e9; border: 3px solid #ddd; border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .food-card:hover { border-color: var(--green); }
        .food-card h3 { font-size: 24px; margin: 10px 0; color: var(--blue); }
        .price { font-size: 26px; font-weight: bold; color: #d32f2f; display: block; margin-bottom: 15px; }
        
        .buy-btn { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* മോഡൽ */
        .modal { background: white; position: fixed; top: 5%; left: 5%; right: 5%; bottom: 5%; padding: 20px; border-radius: 20px; border: 4px solid var(--blue); z-index: 1000; overflow-y: auto; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        .hidden { display: none; }

        input, select { width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #333; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        label { font-weight: bold; font-size: 18px; display: block; margin-top: 15px; }

        .btn-pay { background: var(--blue); color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .btn-confirm { background: var(--green); color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn-lang" onclick="toggleLang()" id="langBtn">മലയാളം</button>
    <button class="btn-admin" onclick="openAdmin()">Settings</button>
</div>

<div class="header">
    <img src="https://i.ibb.co/XkyVzLh/ability-logo.jpg" class="logo" alt="Logo">
    <h1 id="hTitle">Ability Foundation</h1>
    <p id="hSub" style="font-weight: bold;">Food Ordering Service</p>
</div>

<div class="container">
    <div id="loading" style="text-align: center; padding: 50px; font-size: 20px;">Loading Menu... Please wait.</div>
    <div id="menu-container" class="menu-grid"></div>
</div>

<div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

<!-- ഓർഡർ മോഡൽ -->
<div id="order-modal" class="modal hidden">
    <h2 id="item-title" style="text-align: center; color: var(--blue);"></h2>
    
    <label id="lbl-name">Name / പേര്:</label>
    <input type="text" id="custName" placeholder="Enter your name">
    
    <label id="lbl-phone">Phone / ഫോൺ:</label>
    <input type="tel" id="custPhone" placeholder="Mobile number">

    <label id="lbl-dept">Department / ഡിപ്പാർട്ട്മെന്റ്:</label>
    <select id="custDept"></select>

    <label id="lbl-pay">Payment / പെയ്‌മെന്റ് രീതി:</label>
    <select id="payMethod" onchange="checkPayMethod()">
        <option value="Cash on Delivery">Cash on Delivery (COD)</option>
        <option value="Online Payment">Online Payment (UPI)</option>
    </select>

    <div id="upi-section" class="hidden" style="text-align: center; background: #e3f2fd; padding: 15px; border-radius: 15px;">
        <p style="color: var(--blue); font-weight: bold;" id="payStep1">ഘട്ടം 1: താഴെയുള്ള ബട്ടൺ അമർത്തി പണമടയ്ക്കുക</p>
        <button class="btn-pay" onclick="payWithUPI()" id="btnPayNow">PAY NOW WITH UPI</button>
        <p style="font-size: 14px;" id="payStep2">ഘട്ടം 2: പണമടച്ച ശേഷം ഓർഡർ അയക്കുക</p>
    </div>

    <button class="btn-confirm" onclick="confirmOrder()" id="btnSubmit">CONFIRM & SEND ORDER</button>
    <button onclick="closeModal()" style="width: 100%; padding: 10px; margin-top: 10px; border: none; background: #999; color: white; border-radius: 10px;">Back</button>
</div>

<!-- അഡ്മിൻ പാനൽ -->
<div id="admin-modal" class="modal hidden">
    <h2 style="text-align: center;">Admin Settings</h2>
    <label>WhatsApp Number (91 ചേർക്കുക):</label>
    <input type="text" id="setWA" value="919000000000">
    <label>UPI ID (പണം ലഭിക്കാൻ):</label>
    <input type="text" id="setUPI" value="ability@upi">
    <label>Departments (കോമ ഉപയോഗിക്കുക):</label>
    <input type="text" id="setDepts" value="Admin,Kitchen,IT,Hostel,Rehab">
    <label>Admin Password:</label>
    <input type="text" id="setPass" value="1234">
    
    <button class="btn-confirm" onclick="saveSettings()">SAVE SETTINGS</button>
    <button onclick="closeModal()" style="width: 100%; padding: 10px; margin-top: 10px; border: none; background: #999; color: white; border-radius: 10px;">Exit</button>
</div>
