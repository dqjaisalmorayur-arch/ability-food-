<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Foundation Food Hub</title>
    <style>
        :root { --blue: #0288d1; --green: #8bc34a; --text: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #ffffff; color: var(--text); text-align: center; }
        .header { background: white; padding: 15px; border-bottom: 5px solid var(--green); }
        .logo { width: 90px; border-radius: 50%; border: 2px solid var(--green); margin-bottom: 5px; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #eee; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .container { max-width: 900px; margin: 15px auto; padding: 10px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .card { background: #f9f9f9; border: 2px solid #ddd; border-radius: 15px; padding: 10px; }
        .card img { width: 100%; height: 100px; object-fit: contain; }
        .price { font-size: 22px; font-weight: bold; color: #d32f2f; display: block; margin: 5px 0; }
        .buy-btn { background: var(--green); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { background: white; position: fixed; top: 2%; left: 2%; right: 2%; bottom: 2%; padding: 20px; border-radius: 20px; border: 3px solid var(--blue); z-index: 1000; overflow-y: auto; text-align: left; }
        .hidden { display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #333; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        label { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn" style="background:var(--blue); color:white;" onclick="toggleLang()" id="langBtn">മലയാളം</button>
    <button class="btn" onclick="openAdmin()" style="background:#555; color:white;">Settings</button>
</div>

<div class="header">
    <img src="https://i.ibb.co/XkyVzLh/ability-logo.jpg" class="logo" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
    <h1 id="hTitle" style="margin:0; font-size: 24px;">Ability Foundation</h1>
    <p id="hSub" style="margin:0; font-weight: bold;">Food Service Center</p>
</div>

<div class="container">
    <div id="status-msg" style="padding: 20px; font-weight: bold; color: #555;">Loading Menu... Please wait.</div>
    <div id="menu-container" class="menu-grid"></div>
</div>

<div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

<div id="order-modal" class="modal hidden">
    <h2 id="item-title" style="color: var(--blue); text-align: center; margin-top:0;"></h2>
    <label id="lbl-name">Name / പേര്:</label>
    <input type="text" id="custName" placeholder="Enter name">
    <label id="lbl-phone">Phone / ഫോൺ:</label>
    <input type="tel" id="custPhone" placeholder="Mobile number">
    <label id="lbl-dept">Department / ഡിപ്പാർട്ട്മെന്റ്:</label>
    <select id="custDept"></select>
    <label id="lbl-pay">Payment / പെയ്‌മെന്റ് രീതി:</label>
    <select id="payMethod" onchange="togglePayUI()">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="Online Payment">Online Payment (UPI)</option>
    </select>
    <div id="upi-ui" class="hidden" style="background:#e3f2fd; padding:10px; border-radius:10px; text-align:center;">
        <button class="btn" style="background:var(--blue); color:white; width:100%; padding:12px;" onclick="doPay()">PAY NOW WITH UPI</button>
    </div>
    <button class="buy-btn" onclick="sendOrder()" style="margin-top:15px;" id="btnConfirm">CONFIRM ORDER</button>
    <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none; color:red; font-weight:bold; cursor:pointer;">Close</button>
</div>

<script>
    // നിങ്ങളുടെ ഗൂഗിൾ ഷീറ്റ് ഐഡി
    const SHEET_ID = '1IcDJw8pfuELxj78QXGrA19p49hxcIrRZGBHHvxuCFYY';
    const MENU_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
    const DEPT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet2`;

    let menuItems = [];
    let depts = [];
    let selectedItem = null;
    let currentLang = 'en';
    let config = JSON.parse(localStorage.getItem('ability_v_final')) || { wa: "919000000000", upi: "ability@upi", pass: "1234" };

    async function loadData() {
        try {
            // Sheet1-ൽ നിന്ന് ഫുഡ് ഐറ്റങ്ങൾ എടുക്കുന്നു
            const resMenu = await fetch(MENU_URL);
            const textMenu = await resMenu.text();
            const jsonMenu = JSON.parse(textMenu.substr(47).slice(0, -2));
            menuItems = jsonMenu.table.rows.map(row => ({
                name: row.c[0] ? row.c[0].v : "",
                price: row.c[1] ? row.c[1].v : "",
                img: row.c[2] ? row.c[2].v : ""
            })).filter(i => i.name && i.name !== "ItemName");

            // Sheet2-ൽ നിന്ന് ഡിപ്പാർട്ട്മെന്റുകൾ എടുക്കുന്നു
            try {
                const resDept = await fetch(DEPT_URL);
                const textDept = await resDept.text();
                const jsonDept = JSON.parse(textDept.substr(47).slice(0, -2));
                depts = jsonDept.table.rows.map(row => row.c[0] ? row.c[0].v : "").filter(d => d && d !== "Department");
            } catch(e) { 
                depts = ["Office", "Kitchen", "Hostel"]; // പിശക് വന്നാൽ പകരമായി ഇവ വരും
            }

            document.getElementById('status-msg').classList.add('hidden');
            renderMenu();
        } catch (e) {
            document.getElementById('status-msg').innerHTML = "ഗൂഗിൾ ഷീറ്റ് ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല. ഷീറ്റിൽ 'Anyone with the link' എന്ന് നൽകിയിട്ടുണ്ടെന്ന് ഉറപ്പുവരുത്തുക.";
        }
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        menuItems.forEach((item, index) => {
            container.innerHTML += `
                <div class="card">
                    <img src="${item.img || 'https://cdn-icons-png.flaticon.com/512/706/706164.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                    <h4 style="margin:10px 0 5px 0;">${item.name}</h4>
                    <span class="price">₹${item.price}</span>
                    <button class="buy-btn" onclick="openOrder(${index})">${currentLang === 'en' ? 'ORDER' : 'ഓർഡർ'}</button>
                </div>
            `;
        });
    }

    function openOrder(index) {
        selectedItem = menuItems[index];
        document.getElementById('item-title').innerText = selectedItem.name + " - ₹" + selectedItem.price;
        
        const deptSelect = document.getElementById('custDept');
        deptSelect.innerHTML = depts.map(d => `<option value="${d}">${d}</option>`).join('');
        
        document.getElementById('order-modal').classList.remove('hidden');
        document.getElementById('overlay').classList.remove('hidden');
    }

    function togglePayUI() {
        const pay = document.getElementById('payMethod').value;
        document.getElementById('upi-ui').className = (pay === 'Online Payment') ? "" : "hidden";
    }

    function doPay() {
        window.location.href = `upi://pay?pa=${config.upi}&pn=AbilityFoundation&am=${selectedItem.price}&cu=INR`;
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const dept = document.getElementById('custDept').value;
        const pay = document.getElementById('payMethod').value;
        if(!name || !phone) return alert("ദയവായി പേരും നമ്പറും നൽകുക");
        const msg = `*NEW ORDER*%0AItem: ${selectedItem.name}%0APrice: ₹${selectedItem.price}%0AName: ${name}%0APhone: ${phone}%0ADept: ${dept}%0APayment: ${pay}`;
        window.open(`https://wa.me/${config.wa}?text=${msg}`, '_blank');
        closeModal();
    }

    function closeModal() {
        document.getElementById('order-modal').classList.add('hidden');
        document.getElementById('overlay').classList.add('hidden');
    }

    function toggleLang() {
        currentLang = (currentLang === 'en') ? 'ml' : 'en';
        document.getElementById('langBtn').innerText = (currentLang === 'en') ? 'മലയാളം' : 'English';
        document.getElementById('hTitle').innerText = (currentLang === 'en') ? 'Ability Foundation' : 'എബിലിറ്റി ഫൗണ്ടേഷൻ';
        renderMenu();
    }

    function openAdmin() {
        const p = prompt("Admin Password:");
        if(p === config.pass) {
            const n = prompt("WhatsApp (91 ചേർക്കുക):", config.wa);
            const u = prompt("UPI ID:", config.upi);
            if(n && u) {
                config.wa = n; config.upi = u;
                localStorage.setItem('ability_v_final', JSON.stringify(config));
                alert("Settings Saved!");
            }
        }
    }

    loadData();
</script>
</body>
</html>
