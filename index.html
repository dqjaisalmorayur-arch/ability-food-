<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Foundation Food Ordering</title>
    <style>
        :root { --blue: #0288d1; --green: #2e7d32; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #ffffff; color: #000; text-align: center; }
        .header { background: white; padding: 20px; border-bottom: 6px solid var(--green); }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--green); margin-bottom: 10px; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #f4f4f4; border-bottom: 1px solid #ddd; }
        .btn { padding: 12px 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .container { max-width: 900px; margin: 20px auto; padding: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #f9f9f9; border: 2px solid #ddd; border-radius: 20px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .card img { width: 130px; height: 130px; object-fit: contain; }
        .price { font-size: 26px; font-weight: bold; color: #d32f2f; display: block; margin: 10px 0; }
        .buy-btn { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; }
        .modal { background: white; position: fixed; top: 2%; left: 2%; right: 2%; bottom: 2%; padding: 20px; border-radius: 20px; border: 4px solid var(--blue); z-index: 1000; overflow-y: auto; text-align: left; }
        .hidden { display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #333; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        label { font-weight: bold; font-size: 18px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn" style="background:var(--blue); color:white;" onclick="toggleLang()" id="langBtn">മലയാളം</button>
    <button class="btn" onclick="fetchData()" style="background:#333; color:white;">🔄 Refresh</button>
</div>

<div class="header">
    <img src="https://i.ibb.co/XkyVzLh/ability-logo.jpg" class="logo" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
    <h1 id="hTitle">Ability Foundation</h1>
    <p id="hSub" style="font-weight: bold;">Food Service Center</p>
</div>

<div class="container">
    <div id="loader" style="padding: 50px; font-size: 20px; font-weight: bold; color: #555;">ഭക്ഷ്യവിവരങ്ങൾ ശേഖരിക്കുന്നു (Loading Menu)...</div>
    <div id="menu-container" class="menu-grid"></div>
</div>

<div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

<div id="order-modal" class="modal hidden">
    <h2 id="item-title" style="text-align: center; color: var(--blue);"></h2>
    <label id="lbl-name">നിങ്ങളുടെ പേര് (Name):</label>
    <input type="text" id="custName">
    <label id="lbl-phone">ഫോൺ നമ്പർ (Phone):</label>
    <input type="tel" id="custPhone">
    <label id="lbl-dept">ഡിപ്പാർട്ട്മെന്റ് (Dept):</label>
    <select id="custDept"></select>
    <label id="lbl-pay">പെയ്‌മെന്റ് രീതി (Payment):</label>
    <select id="payMethod" onchange="togglePay()">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="Online Payment">Online Payment (UPI)</option>
    </select>
    <div id="upi-box" class="hidden" style="background:#e3f2fd; padding:15px; border-radius:15px; text-align:center; border: 2px dashed var(--blue);">
        <button class="btn" style="background:var(--blue); color:white; width:100%;" onclick="payUPI()">PAY NOW WITH UPI</button>
        <p style="font-size:12px; margin-top:10px; color:red;">പണമടച്ച ശേഷം ആപ്പിൽ കാണുന്ന 12 അക്ക <b>UTR Number</b> താഴെ നൽകുക:</p>
        <input type="number" id="utr" placeholder="Enter 12 Digit UTR">
    </div>
    <button class="buy-btn" id="confirmBtn" onclick="submitOrder()" style="margin-top:20px;">CONFIRM ORDER</button>
    <button onclick="closeModal()" style="width:100%; margin-top:15px; background:none; border:none; color:red; font-size:18px;">Close</button>
</div>

<script>
    const S_ID = '1IcDJw8pfuELxj78QXGrA19p49hxcIrRZGBHHvxuCFYY';
    const WA_NUM = "919746859576";
    const UPI_ID = "dqjaisalmorayur@okicici";

    let menu = [], depts = [], sel = null, lang = 'en';

    async function fetchData() {
        document.getElementById('loader').classList.remove('hidden');
        try {
            // ബട്ടൺ ഇല്ലാതെ നേരിട്ട് ഡാറ്റ എടുക്കുന്നു
            const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&t=${Date.now()}`;
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const rows = json.table.rows;

            menu = []; depts = [];
            rows.forEach((r) => {
                const n = r.c[0] ? r.c[0].v : "";
                const p = r.c[1] ? r.c[1].v : "";
                const i = r.c[2] ? r.c[2].v : "";
                const d = r.c[4] ? r.c[4].v : "";

                if (n && n !== "ItemName") menu.push({ n, p, i });
                if (d && d.toLowerCase() !== "department") depts.push(d);
            });

            document.getElementById('loader').classList.add('hidden');
            render();
        } catch (e) {
            document.getElementById('loader').innerText = "ഗൂഗിൾ ഷീറ്റ് ആപ്പിൽ 'Manage Access' പോയി 'Anyone with link' എന്ന് മാറ്റുക.";
        }
    }

    function render() {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        menu.forEach((item, i) => {
            container.innerHTML += `
                <div class="card">
                    <img src="${item.i || 'https://cdn-icons-png.flaticon.com/512/706/706164.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                    <h3>${item.n}</h3>
                    <span class="price">₹${item.p}</span>
                    <button class="buy-btn" onclick="openModal(${i})">${lang === 'en' ? 'ORDER' : 'ഓർഡർ'}</button>
                </div>`;
        });
    }

    function openModal(i) {
        sel = menu[i];
        document.getElementById('item-title').innerText = sel.n + " - ₹" + sel.p;
        document.getElementById('custDept').innerHTML = depts.map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('order-modal').classList.remove('hidden');
        document.getElementById('overlay').classList.remove('hidden');
    }

    function togglePay() {
        const p = document.getElementById('payMethod').value;
        document.getElementById('upi-box').className = (p === 'Online Payment') ? "" : "hidden";
    }

    function payUPI() {
        window.location.href = `upi://pay?pa=${UPI_ID}&pn=Ability&am=${sel.p}&cu=INR`;
    }

    function submitOrder() {
        const n = document.getElementById('custName').value;
        const p = document.getElementById('custPhone').value;
        const d = document.getElementById('custDept').value;
        const m = document.getElementById('payMethod').value;
        const u = document.getElementById('utr').value;

        if(!n || !p) return alert("പേരും ഫോണും നൽകുക");
        if(m === 'Online Payment' && u.length < 10) return alert("UTR Number നൽകുക");

        let txt = `*NEW ORDER*%0AItem: ${sel.n}%0APrice: ₹${sel.p}%0AName: ${n}%0APhone: ${p}%0ADept: ${d}%0APay: ${m}`;
        if(u) txt += `%0AUTR: ${u}`;
        
        window.open(`https://wa.me/${WA_NUM}?text=${txt}`, '_blank');
        closeModal();
    }

    function closeModal() {
        document.getElementById('order-modal').classList.add('hidden');
        document.getElementById('overlay').classList.add('hidden');
    }

    function toggleLang() {
        lang = (lang === 'en') ? 'ml' : 'en';
        document.getElementById('langBtn').innerText = (lang === 'en') ? 'മലയാളം' : 'English';
        document.getElementById('hTitle').innerText = (lang === 'en') ? 'Ability Foundation' : 'എബിലിറ്റി ഫൗണ്ടേഷൻ';
        render();
    }

    fetchData();
</script>
</body>
</html>
