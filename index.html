<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Foundation - Secure Food Order</title>
    <style>
        :root { --blue: #0288d1; --green: #2e7d32; --red: #d32f2f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #fdfdfd; color: #000; text-align: center; }
        .header { background: white; padding: 15px; border-bottom: 5px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { width: 90px; border-radius: 50%; border: 2px solid var(--green); }
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: #eeeeee; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border: 2px solid #ddd; border-radius: 15px; padding: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 110px; object-fit: contain; }
        .price { font-size: 22px; font-weight: bold; color: var(--red); display: block; margin: 8px 0; }
        .buy-btn { background: var(--green); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .modal { background: white; position: fixed; top: 2%; left: 2%; right: 2%; bottom: 2%; padding: 20px; border-radius: 20px; border: 4px solid var(--blue); z-index: 1000; overflow-y: auto; text-align: left; }
        .hidden { display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #333; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .pay-box { background: #e3f2fd; padding: 15px; border-radius: 15px; border: 2px dashed var(--blue); margin: 10px 0; text-align: center; }
        .confirm-btn { background: var(--green); color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .confirm-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="buy-btn" style="width: auto; background: var(--blue);" onclick="toggleLang()" id="langBtn">മലയാളം</button>
    <button class="buy-btn" style="width: auto; background: #333;" onclick="openAdmin()">Settings</button>
</div>

<div class="header">
    <img src="https://i.ibb.co/XkyVzLh/ability-logo.jpg" class="logo" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
    <h1 id="hTitle" style="margin:5px 0; font-size: 22px; color: var(--blue);">Ability Foundation</h1>
    <p id="hSub" style="margin:0; font-weight: bold; font-size: 14px;">Food Service Ordering</p>
</div>

<div class="container">
    <div id="status-msg" style="padding: 30px; font-weight: bold; color: #666;">Loading Menu Data...</div>
    <div id="menu-container" class="menu-grid"></div>
</div>

<div id="overlay" class="overlay hidden" onclick="closeModal()"></div>

<div id="order-modal" class="modal hidden">
    <h2 id="item-title" style="text-align: center; color: var(--blue); margin-top: 0;"></h2>
    
    <label id="lbl-name">നിങ്ങളുടെ പേര് (Name):</label>
    <input type="text" id="custName" placeholder="Enter Name">
    
    <label id="lbl-phone">ഫോൺ നമ്പർ (Phone):</label>
    <input type="tel" id="custPhone" placeholder="Mobile Number">

    <label id="lbl-dept">ഡിപ്പാർട്ട്മെന്റ് (Department):</label>
    <select id="custDept"></select>

    <label id="lbl-pay">പെയ്‌മെന്റ് രീതി (Payment):</label>
    <select id="payMethod" onchange="handlePaymentSelection()">
        <option value="Cash on Delivery">Cash on Delivery (COD)</option>
        <option value="Online Payment">Online Payment (UPI)</option>
    </select>

    <div id="online-ui" class="hidden pay-box">
        <p style="color:var(--blue); font-weight:bold;" id="txt-step1">Step 1: താഴെ കാണുന്ന ബട്ടൺ അമർത്തി പണമടയ്ക്കുക</p>
        <button class="buy-btn" style="background:var(--blue);" onclick="initiatePayment()">PAY WITH GPAY/PHONEPE</button>
        <p style="margin-top:15px; font-weight:bold; color:var(--red);" id="txt-step2">Step 2: പണമടച്ച ശേഷം കിട്ടുന്ന 12 അക്ക Transaction ID (UTR) താഴെ നൽകുക</p>
        <input type="number" id="utrNumber" placeholder="Enter 12-digit UTR Number" oninput="validateUTR()">
    </div>

    <button class="confirm-btn" id="finalBtn" onclick="sendOrder()">CONFIRM & SEND ORDER</button>
    <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none; color:red; cursor:pointer; font-weight:bold;">Cancel</button>
</div>

<script>
    const SHEET_ID = '1IcDJw8pfuELxj78QXGrA19p49hxcIrRZGBHHvxuCFYY';
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&t=${Date.now()}`;

    let menuItems = [];
    let depts = [];
    let selectedItem = null;
    let currentLang = 'en';
    let paidClicked = false;

    let config = JSON.parse(localStorage.getItem('ability_v7_secure')) || { 
        wa: "919746859576", 
        upi: "dqjaisalmorayur@okicici", 
        pass: "1234" 
    };

    async function loadData() {
        try {
            const res = await fetch(DATA_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            menuItems = [];
            depts = [];

            rows.forEach((row) => {
                const name = row.c[0] ? row.c[0].v : null;
                const price = row.c[1] ? row.c[1].v : null;
                const img = row.c[2] ? row.c[2].v : null;
                const dept = row.c[4] ? row.c[4].v : null;

                if (name && name !== "ItemName") menuItems.push({ name, price, img });
                if (dept && dept.toLowerCase() !== "department") depts.push(dept);
            });

            document.getElementById('status-msg').classList.add('hidden');
            renderMenu();
        } catch (e) {
            document.getElementById('status-msg').innerHTML = "സെർവർ ബിസിയാണ്. പേജ് റീഫ്രഷ് ചെയ്യുക.";
        }
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        menuItems.forEach((item, index) => {
            container.innerHTML += `
                <div class="card">
                    <img src="${item.img || 'https://cdn-icons-png.flaticon.com/512/706/706164.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                    <h3 style="font-size:18px; margin:10px 0;">${item.name}</h3>
                    <span class="price">₹${item.price}</span>
                    <button class="buy-btn" onclick="openOrder(${index})">${currentLang === 'en' ? 'ORDER' : 'ഓർഡർ'}</button>
                </div>`;
        });
    }

    function openOrder(index) {
        selectedItem = menuItems[index];
        paidClicked = false;
        document.getElementById('item-title').innerText = selectedItem.name + " - ₹" + selectedItem.price;
        document.getElementById('custDept').innerHTML = depts.map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('order-modal').classList.remove('hidden');
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('payMethod').value = "Cash on Delivery";
        handlePaymentSelection();
    }

    function handlePaymentSelection() {
        const method = document.getElementById('payMethod').value;
        const onlineUI = document.getElementById('online-ui');
        const finalBtn = document.getElementById('finalBtn');

        if (method === "Online Payment") {
            onlineUI.classList.remove('hidden');
            finalBtn.disabled = true; // പണമടയ്ക്കുന്നത് വരെ ബട്ടൺ ഓഫ് ആക്കുന്നു
        } else {
            onlineUI.classList.add('hidden');
            finalBtn.disabled = false;
        }
    }

    function initiatePayment() {
        const url = `upi://pay?pa=${config.upi}&pn=AbilityFoundation&am=${selectedItem.price}&cu=INR`;
        window.location.href = url;
        paidClicked = true;
        validateUTR();
    }

    function validateUTR() {
        const utr = document.getElementById('utrNumber').value;
        const finalBtn = document.getElementById('finalBtn');
        // 12 അക്കം ഉണ്ടെങ്കിൽ മാത്രം ഓർഡർ ബട്ടൺ ഓൺ ആകും
        if (document.getElementById('payMethod').value === "Online Payment") {
            finalBtn.disabled = !(utr.length === 12 && paidClicked);
        }
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const dept = document.getElementById('custDept').value;
        const pay = document.getElementById('payMethod').value;
        const utr = document.getElementById('utrNumber').value;

        if(!name || !phone) return alert("പേരും ഫോണും നൽകുക!");

        let msg = `*NEW ORDER - ABILITY*%0A--------------------------%0A*Item:* ${selectedItem.name}%0A*Price:* ₹${selectedItem.price}%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Dept:* ${dept}%0A*Payment:* ${pay}`;
        
        if(pay === "Online Payment") {
            msg += `%0A*UTR ID:* ${utr}%0A_(Please verify payment manually)_`;
        }

        window.open(`https://wa.me/${config.wa}?text=${msg}`, '_blank');
        closeModal();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en') ? 'ml' : 'en';
        document.getElementById('langBtn').innerText = (currentLang === 'en') ? 'മലയാളം' : 'English';
        document.getElementById('hTitle').innerText = (currentLang === 'en') ? 'Ability Foundation' : 'എബിലിറ്റി ഫൗണ്ടേഷൻ';
        document.getElementById('lbl-name').innerText = (currentLang === 'en') ? 'Your Name:' : 'നിങ്ങളുടെ പേര്:';
        document.getElementById('lbl-phone').innerText = (currentLang === 'en') ? 'Phone Number:' : 'ഫോൺ നമ്പർ:';
        document.getElementById('btnConfirm').innerText = (currentLang === 'en') ? 'CONFIRM ORDER' : 'ഓർഡർ അയക്കുക';
        renderMenu();
    }

    function openAdmin() {
        const p = prompt("Admin Password:");
        if(p === config.pass) {
            const n = prompt("WhatsApp (eg: 919746...):", config.wa);
            const u = prompt("UPI ID:", config.upi);
            if(n && u) {
                config.wa = n; config.upi = u;
                localStorage.setItem('ability_v7_secure', JSON.stringify(config));
                alert("Settings Saved!");
                location.reload();
            }
        }
    }

    function closeModal() {
        document.getElementById('order-modal').classList.add('hidden');
        document.getElementById('overlay').classList.add('hidden');
    }

    loadData();
    // ഓരോ മിനിറ്റിലും ഡാറ്റ പുതുക്കുന്നു
    setInterval(loadData, 60000);
</script>
</body>
</html>
